# 章节规划生成提示词
prompt: |
  请为小说《{title}》生成第{start_ch}到{end_ch}章的详细规划。

  世界设定: {world_building}

  主要角色:
  {characters}

  情节结构:
  {plot_structure}

  请为每章输出:
  - number: 章节号
  - title: 章节标题
  - summary: 本章概要
  - key_events: 本章关键事件列表
  - shuangdian: 本章爽点设计（如有）

  输出JSON格式:
  {{"chapter_plans": [...]}}
